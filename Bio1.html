<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Biology Flashcards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Modern fluid height for mobile */
        :root {
            --card-height: 70vh;
        }
        @media (min-width: 768px) {
            :root {
                --card-height: 500px;
            }
        }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; -webkit-backface-visibility: hidden; }
        
        .card-container {
            height: var(--card-height);
            width: 100%;
            max-width: 400px;
        }

        /* Prevent text selection during fast tapping on mobile */
        .no-select {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center font-sans p-4 sm:p-8 no-select">

    <div class="flex flex-col items-center justify-center w-full max-w-lg">
        
        <!-- Card Container -->
        <div class="card-container perspective-1000 cursor-pointer mb-6 sm:mb-8" onclick="flipCard()">
            <div id="card-inner" class="w-full h-full relative transition-transform duration-500 preserve-3d shadow-xl rounded-2xl">
                
                <!-- Front of Card (English) -->
                <div class="absolute inset-0 w-full h-full backface-hidden bg-white rounded-2xl overflow-hidden border border-slate-200 flex flex-col">
                    <div class="h-2/5 w-full bg-slate-100 flex items-center justify-center border-b border-slate-200 relative">
                        <img id="front-image" class="w-full h-full object-cover" src="" alt="Card image">
                        <div class="absolute top-3 right-3 bg-white/90 backdrop-blur-sm px-2.5 py-1 rounded-full text-[10px] font-bold text-slate-600 shadow-sm z-10 uppercase tracking-wider">
                            English
                        </div>
                    </div>

                    <div class="h-3/5 w-full p-6 sm:p-8 flex flex-col items-center justify-center text-center relative overflow-y-auto">
                        <h2 id="front-term" class="text-2xl sm:text-3xl font-extrabold text-slate-800 mb-2 leading-tight"></h2>
                        <p id="front-syllables" class="text-indigo-600 font-semibold mb-4 text-xs tracking-widest uppercase"></p>
                        <div class="mt-auto pt-4">
                            <span class="inline-flex items-center text-slate-400 text-xs font-medium">
                                <i data-lucide="refresh-cw" class="w-3 h-3 mr-1.5"></i>
                                Tap to flip
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Back of Card (Finnish) -->
                <div class="absolute inset-0 w-full h-full backface-hidden bg-indigo-600 text-white rounded-2xl overflow-hidden border border-indigo-700 flex flex-col" style="transform: rotateY(180deg);">
                    <div class="h-2/5 w-full bg-indigo-900/20 flex items-center justify-center border-b border-white/10 relative">
                        <img id="back-image" class="w-full h-full object-cover opacity-40 mix-blend-overlay" src="" alt="Card image">
                        <div class="absolute top-3 right-3 bg-indigo-800/80 backdrop-blur-sm px-2.5 py-1 rounded-full text-[10px] font-bold text-indigo-100 shadow-sm z-10 uppercase tracking-wider border border-white/10">
                            Finnish
                        </div>
                    </div>
                    
                    <div class="h-3/5 w-full p-6 sm:p-8 flex flex-col items-center justify-center text-center overflow-y-auto">
                        <h2 id="back-term" class="text-2xl sm:text-3xl font-extrabold mb-2 leading-tight"></h2>
                        <p id="back-syllables" class="text-indigo-200 font-semibold mb-4 text-xs tracking-widest uppercase"></p>
                        <div class="flex-grow flex items-center justify-center">
                            <p id="back-description" class="text-indigo-50 text-sm sm:text-base leading-relaxed font-medium"></p>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Controls -->
        <div class="flex items-center justify-between w-full max-w-sm px-4">
            <button onclick="prevCard(event)" class="w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-md active:scale-95 text-slate-700 transition-all focus:outline-none ring-offset-2 focus:ring-2 focus:ring-indigo-500">
                <i data-lucide="chevron-left" class="w-6 h-6"></i>
            </button>
            
            <div class="flex flex-col items-center">
                <span id="card-counter" class="text-slate-600 font-bold text-xs tracking-widest uppercase"></span>
                <div class="flex gap-1 mt-1.5" id="progress-dots"></div>
            </div>

            <button onclick="nextCard(event)" class="w-12 h-12 flex items-center justify-center rounded-full bg-white shadow-md active:scale-95 text-slate-700 transition-all focus:outline-none ring-offset-2 focus:ring-2 focus:ring-indigo-500">
                <i data-lucide="chevron-right" class="w-6 h-6"></i>
            </button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        let cards = [
            { id: 1, english: 'Cell', engSyllables: 'Cell', finnish: 'Solu', finSyllables: 'so-lu', description: 'The basic structural and functional unit of all organisms.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Cell' },
            { id: 2, english: 'Animal Cell', engSyllables: 'An-i-mal Cell', finnish: 'Eläinsolu', finSyllables: 'e-läin-so-lu', description: 'A eukaryotic cell containing membrane-bound organelles like a nucleus, but lacking a cell wall.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Animal+Cell' },
            { id: 3, english: 'Bacterial Cell', engSyllables: 'Bac-te-ri-al Cell', finnish: 'Bakteerisolu', finSyllables: 'bak-tee-ri-so-lu', description: 'A prokaryotic cell structure lacking a true nucleus.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Bacterial+Cell' },
            { id: 4, english: 'Archaea Cell', engSyllables: 'Ar-chae-a Cell', finnish: 'Arkkisolu', finSyllables: 'ark-ki-so-lu', description: 'A single-celled microorganism that lacks a cell nucleus and is distinct from bacteria.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Archaea+Cell' },
            { id: 5, english: 'Nucleus', engSyllables: 'Nu-cle-us', finnish: 'Tuma', finSyllables: 'tu-ma', description: 'A membrane-bound organelle that contains the cell\'s genetic material.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Nucleus' },
            { id: 6, english: 'Nucleolus', engSyllables: 'Nu-cle-o-lus', finnish: 'Tumajyvänen', finSyllables: 'tu-ma-jy-vä-nen', description: 'A dense structure within the nucleus.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Nucleolus' },
            { id: 7, english: 'Chromatin', engSyllables: 'Chro-ma-tin', finnish: 'Kromatiini', finSyllables: 'kro-ma-tii-ni', description: 'Material consisting of DNA and proteins, located in the nucleus.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Chromatin' },
            { id: 8, english: 'Mitochondrion', engSyllables: 'Mi-to-chon-dri-on', finnish: 'Mitokondrio', finSyllables: 'mi-to-kon-dri-o', description: 'The powerhouse of the cell, generating ATP through cellular respiration.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Mitochondrion' },
            { id: 9, english: 'Cytoplasm', engSyllables: 'Cy-to-plasm', finnish: 'Solulima', finSyllables: 'so-lu-li-ma', description: 'Site of metabolic processes; the jelly-like substance inside the cell.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Cytoplasm' },
            { id: 10, english: 'Plasma Membrane', engSyllables: 'Plas-ma Mem-brane', finnish: 'Solukalvo', finSyllables: 'so-lu-kal-vo', description: 'Selectively permeable barrier; handles nutrient and waste transport.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Plasma+Membrane' },
            { id: 11, english: 'Cell Wall', engSyllables: 'Cell Wall', finnish: 'Soluseinä', finSyllables: 'so-lu-sei-nä', description: 'Provides shape and protection from osmotic stress.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Cell+Wall' },
            { id: 12, english: 'Ribosome', engSyllables: 'Ri-bo-some', finnish: 'Ribosomi', finSyllables: 'ri-bo-so-mi', description: 'Responsible for protein synthesis.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Ribosome' },
            { id: 13, english: 'Rough Endoplasmic Reticulum', engSyllables: 'Rough En-do-plas-mic Re-tic-u-lum', finnish: 'Karkea solulimakalvosto', finSyllables: 'kar-ke-a so-lu-li-ma-kal-vos-to', description: 'Studded with ribosomes, involved in protein production.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Rough+ER' },
            { id: 14, english: 'Smooth Endoplasmic Reticulum', engSyllables: 'Smooth En-do-plas-mic Re-tic-u-lum', finnish: 'Sileä solulimakalvosto', finSyllables: 'si-le-ä so-lu-li-ma-kal-vos-to', description: 'Lacks ribosomes, involved in various metabolic processes.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Smooth+ER' },
            { id: 15, english: 'Golgi Apparatus', engSyllables: 'Gol-gi Ap-pa-ra-tus', finnish: 'Golgin laite', finSyllables: 'Gol-gin lai-te', description: 'Modifies, sorts, and packages proteins and lipids.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Golgi' },
            { id: 16, english: 'Lysosome', engSyllables: 'Ly-so-some', finnish: 'Lysosomi', finSyllables: 'ly-so-so-mi', description: 'Contains digestive enzymes to break down waste.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Lysosome' },
            { id: 17, english: 'Centrioles', engSyllables: 'Cen-tri-oles', finnish: 'Keskusjyväset', finSyllables: 'kes-kus-jy-vä-set', description: 'Involved in cell division in animal cells.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Centrioles' },
            { id: 18, english: 'Cytoskeleton', engSyllables: 'Cy-to-skel-e-ton', finnish: 'Solutukiranka', finSyllables: 'so-lu-tu-ki-ran-ka', description: 'Network of fibers providing structural support to the cell.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Cytoskeleton' },
            { id: 19, english: 'Plasmid', engSyllables: 'Plas-mid', finnish: 'Plasmidi', finSyllables: 'plas-mi-di', description: 'Small, circular DNA providing genetic advantages.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Plasmid' },
            { id: 20, english: 'Nucleoid', engSyllables: 'Nu-cle-oid', finnish: 'Nukleoidi', finSyllables: 'nuk-le-oi-di', description: 'Localization of genetic material (DNA) in prokaryotes.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Nucleoid' },
            { id: 21, english: 'Flagellum', engSyllables: 'Fla-gel-lum', finnish: 'Siima', finSyllables: 'sii-ma', description: 'Tail-like structure used for movement.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Flagellum' },
            { id: 22, english: 'Pili', engSyllables: 'Pi-li', finnish: 'Pilukset', finSyllables: 'pi-luk-set', description: 'Hair-like appendages involved in bacterial mating.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Pili' },
            { id: 23, english: 'Fimbriae', engSyllables: 'Fim-bri-ae', finnish: 'Fimbriat', finSyllables: 'fim-bri-at', description: 'Used for attachment to surfaces.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Fimbriae' },
            { id: 24, english: 'Capsule', engSyllables: 'Cap-sule', finnish: 'Kapseli', finSyllables: 'kap-se-li', description: 'Provides resistance to phagocytosis and adherence to surfaces.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Capsule' },
            { id: 25, english: 'Mesosome', engSyllables: 'Mes-o-some', finnish: 'Mesosomi', finSyllables: 'me-so-so-mi', description: 'Role in replication and cell wall synthesis.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Mesosome' },
            { id: 26, english: 'Gas Vacuole', engSyllables: 'Gas Vac-u-ole', finnish: 'Kaasuvakuoli', finSyllables: 'kaa-su-va-ku-o-li', description: 'Helps in floating in aquatic environments.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Gas+Vacuole' },
            { id: 27, english: 'Periplasmic Space', engSyllables: 'Per-i-plas-mic Space', finnish: 'Periplasminen tila', finSyllables: 'pe-ri-plas-mi-nen ti-la', description: 'Contains enzymes and binding proteins for nutrient processing.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Periplasmic+Space' },
            { id: 28, english: 'Inclusion Bodies', engSyllables: 'In-clu-sion Bod-ies', finnish: 'Inkluusiokappaleet', finSyllables: 'in-kluu-si-o-kap-pa-leet', description: 'Storage of carbon, phosphate, and other substances.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Inclusion+Bodies' },
            { id: 29, english: 'Food / Nutrients', engSyllables: 'Food / Nu-tri-ents', finnish: 'Ravinto', finSyllables: 'ra-vin-to', description: 'The source material consumed for energy.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Food' },
            { id: 30, english: 'Glucose', engSyllables: 'Glu-cose', finnish: 'Glukoosi', finSyllables: 'glu-koo-si', description: 'A simple sugar acting as the primary energy source.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Glucose' },
            { id: 31, english: 'Oxygen', engSyllables: 'Ox-y-gen', finnish: 'Happi', finSyllables: 'hap-pi', description: 'Required for aerobic cellular respiration.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Oxygen' },
            { id: 32, english: 'Carbon Dioxide', engSyllables: 'Car-bon Di-ox-ide', finnish: 'Hiilidioksidi', finSyllables: 'hii-li-di-ok-si-di', description: 'A byproduct molecule of cellular respiration.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=CO2' },
            { id: 33, english: 'Water', engSyllables: 'Wa-ter', finnish: 'Vesi', finSyllables: 've-si', description: 'A byproduct liquid of cellular respiration.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Water' },
            { id: 34, english: 'Energy (ATP)', engSyllables: 'En-er-gy (A-T-P)', finnish: 'Energia (ATP)', finSyllables: 'e-ner-gi-a (A-T-P)', description: 'The primary energy carrier produced during respiration.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=ATP' },
            { id: 35, english: 'Glycolysis', engSyllables: 'Gly-col-y-sis', finnish: 'Glykolyysi', finSyllables: 'gly-ko-lyy-si', description: 'Step 1 of cellular respiration, breaking glucose into pyruvate.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Glycolysis' },
            { id: 36, english: 'Pyruvate', engSyllables: 'Py-ru-vate', finnish: 'Pyruvaatti', finSyllables: 'py-ru-vaat-ti', description: 'The end product of glycolysis.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Pyruvate' },
            { id: 37, english: 'Krebs Cycle', engSyllables: 'Krebs Cy-cle', finnish: 'Sitruunahappokierto', finSyllables: 'sit-ruu-na-hap-po-kier-to', description: 'Step 2 of cellular respiration inside the mitochondrion.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Krebs' },
            { id: 38, english: 'Electron Transport', engSyllables: 'E-lec-tron Trans-port', finnish: 'Elektroninsiirtoketju', finSyllables: 'e-lek-tro-nin-siir-to-ket-ju', description: 'Step 3 of cellular respiration, producing the bulk of ATP.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=Electron+Transport' },
            { id: 39, english: 'NADH', engSyllables: 'N-A-D-H', finnish: 'NADH', finSyllables: 'N-A-D-H', description: 'An electron carrier molecule used in cellular respiration.', imageUrl: 'https://placehold.co/600x400/e2e8f0/1e293b?text=NADH' }
        ];

        let currentIndex = 0;
        let isFlipped = false;

        const cardInner = document.getElementById('card-inner');
        const frontTerm = document.getElementById('front-term');
        const frontSyllables = document.getElementById('front-syllables');
        const frontImage = document.getElementById('front-image');
        const backTerm = document.getElementById('back-term');
        const backSyllables = document.getElementById('back-syllables');
        const backDescription = document.getElementById('back-description');
        const backImage = document.getElementById('back-image');
        const cardCounter = document.getElementById('card-counter');
        const dotsContainer = document.getElementById('progress-dots');

        function renderCard() {
            const currentCard = cards[currentIndex];
            frontTerm.textContent = currentCard.english;
            frontSyllables.textContent = currentCard.engSyllables;
            frontImage.src = currentCard.imageUrl;
            backTerm.textContent = currentCard.finnish;
            backSyllables.textContent = currentCard.finSyllables;
            backDescription.textContent = currentCard.description;
            backImage.src = currentCard.imageUrl;
            cardCounter.textContent = `${currentIndex + 1} / ${cards.length}`;
            updateDots();
        }

        function updateDots() {
            dotsContainer.innerHTML = '';
            // Only show 5 dots centered around current index for mobile space
            const start = Math.max(0, currentIndex - 2);
            const end = Math.min(cards.length, start + 5);
            for (let i = start; i < end; i++) {
                const dot = document.createElement('div');
                dot.className = `h-1.5 rounded-full transition-all duration-300 ${i === currentIndex ? 'w-4 bg-indigo-500' : 'w-1.5 bg-slate-300'}`;
                dotsContainer.appendChild(dot);
            }
        }

        function flipCard() {
            isFlipped = !isFlipped;
            cardInner.style.transform = isFlipped ? 'rotateY(180deg)' : 'rotateY(0deg)';
        }

        function nextCard(event) {
            if (event) event.stopPropagation();
            if (isFlipped) {
                flipCard();
                setTimeout(() => changeIndex(1), 250);
            } else {
                changeIndex(1);
            }
        }

        function prevCard(event) {
            if (event) event.stopPropagation();
            if (isFlipped) {
                flipCard();
                setTimeout(() => changeIndex(-1), 250);
            } else {
                changeIndex(-1);
            }
        }

        function changeIndex(delta) {
            currentIndex = (currentIndex + delta + cards.length) % cards.length;
            renderCard();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextCard();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevCard();
            } else if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'Enter') {
                e.preventDefault();
                flipCard();
            }
        });

        window.onload = () => {
            renderCard();
        };
    </script>
</body>
</html>
