<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workshop for Educators (TEDx Style)</title>
    <!-- Load React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Load Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Load Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Merriweather:ital,wght@1,400;1,700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .serif { font-family: 'Merriweather', serif; }
        
        @keyframes slideUpFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .reveal-visible {
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .highlight-text { background: linear-gradient(120deg, #3b82f6 0%, #8b5cf6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="root" class="w-full h-full flex justify-center"></div>

<script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Icons ---
    const Icon = ({ children, className, size = 24, ...props }) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
    );
    const ChevronRight = (p) => <Icon {...p}><polyline points="9 18 15 12 9 6" /></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><polyline points="15 18 9 12 15 6" /></Icon>;
    const Brain = (p) => <Icon {...p}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" /><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" /></Icon>;
    const Layers = (p) => <Icon {...p}><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></Icon>;
    const Target = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><circle cx="12" cy="12" r="6" /><circle cx="12" cy="12" r="2" /></Icon>;
    const BookOpen = (p) => <Icon {...p}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" /><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" /></Icon>;
    const Beaker = (p) => <Icon {...p}><path d="M4.5 3h15" /><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3" /><path d="M6 14h12" /></Icon>;
    const Code = (p) => <Icon {...p}><polyline points="16 18 22 12 16 6" /><polyline points="8 6 2 12 8 18" /></Icon>;
    const Palette = (p) => <Icon {...p}><circle cx="13.5" cy="6.5" r=".5" /><circle cx="17.5" cy="10.5" r=".5" /><circle cx="8.5" cy="7.5" r=".5" /><circle cx="6.5" cy="12.5" r=".5" /><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z" /></Icon>;
    const Globe = (p) => <Icon {...p}><circle cx="12" cy="12" r="10" /><line x1="2" y1="12" x2="22" y2="12" /><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" /></Icon>;
    const MonitorPlay = (p) => <Icon {...p}><path d="m10 7 5 3-5 3z" /><rect width="20" height="14" x="2" y="3" rx="2" /><path d="M12 17v4" /><path d="M8 21h8" /></Icon>;
    const Sparkles = (p) => <Icon {...p}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" /><path d="M5 3v4" /><path d="M9 5H5" /><path d="M6 19v2" /><path d="M19 6h2" /><path d="M20 5v2" /></Icon>;
    const FileText = (p) => <Icon {...p}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><line x1="10" y1="9" x2="8" y2="9" /></Icon>;
    const ImageIcon = (p) => <Icon {...p}><rect width="18" height="18" x="3" y="3" rx="2" ry="2" /><circle cx="9" cy="9" r="2" /><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21" /></Icon>;
    const CheckCircle = (p) => <Icon {...p}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></Icon>;

    // --- Dynamic Step Component ---
    const Step = ({ visible, children, className = "" }) => {
        if (!visible) return null;
        return (
            <div className={`reveal-visible ${className}`}>
                {children}
            </div>
        );
    };

    const Presentation = () => {
        const [currSlide, setCurrSlide] = useState(0);
        const [currStep, setCurrStep] = useState(0);
        const scrollContainerRef = useRef(null);

        // Auto-scroll effect
        useEffect(() => {
            if (scrollContainerRef.current) {
                if (currStep === 0) {
                    scrollContainerRef.current.scrollTo({ top: 0, behavior: 'auto' });
                } else {
                    setTimeout(() => {
                        scrollContainerRef.current.scrollTo({
                            top: scrollContainerRef.current.scrollHeight,
                            behavior: 'smooth'
                        });
                    }, 50);
                }
            }
        }, [currStep, currSlide]);

        const slides = [
            {
                id: 1,
                title: "AI in the Classroom",
                subtitle: "Mastering Context & Creativity",
                icon: <Brain className="w-24 h-24 text-blue-500 mb-6" />,
                maxSteps: 3,
                content: (step) => (
                    <div className="space-y-10 text-center md:text-left">
                        <Step visible={true}>
                            <p className="text-3xl md:text-4xl text-slate-300 leading-snug font-light">
                                Welcome, educators. Today we move <br className="hidden md:block" /> beyond generic searches.
                            </p>
                        </Step>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-10 mt-12">
                            <Step visible={step >= 1} className="p-10 bg-slate-800/50 border-l-8 border-red-500 rounded-2xl shadow-xl backdrop-blur-sm">
                                <h3 className="text-2xl font-bold text-red-400 mb-4 uppercase tracking-wider">The Problem</h3>
                                <p className="text-slate-200 text-2xl">Generic searches = <span className="text-white font-black underline">Generic results</span>.</p>
                                <p className="text-slate-400 text-lg mt-4 font-medium italic">They ignore your specific curriculum.</p>
                            </Step>
                            
                            <Step visible={step >= 2} className="p-10 bg-blue-900/30 border-l-8 border-blue-500 rounded-2xl shadow-xl backdrop-blur-sm">
                                <h3 className="text-2xl font-bold text-blue-400 mb-4 uppercase tracking-wider">The Solution</h3>
                                <p className="text-slate-200 text-2xl font-bold">Contextual Prompting.</p>
                                <p className="text-slate-400 text-lg mt-4">Ground the AI in <span className="text-white font-bold underline decoration-blue-500 decoration-4">your specific content</span>.</p>
                            </Step>
                        </div>
                    </div>
                )
            },
            {
                id: 2,
                title: "The Golden Rule",
                subtitle: "Context is King",
                icon: <Layers className="w-24 h-24 text-purple-500 mb-6" />,
                maxSteps: 5,
                content: (step) => (
                    <div className="space-y-12">
                         <Step visible={step >= 1} className="bg-slate-800/80 p-8 rounded-xl border-l-8 border-slate-600">
                            <p className="font-mono text-lg text-slate-500 mb-3 uppercase font-bold tracking-widest">Generic Prompt</p>
                            <p className="text-3xl text-slate-400 line-through decoration-red-500/50 decoration-4 font-medium">"Create a quiz about photosynthesis."</p>
                        </Step>

                        {/* Step 2: The Generic Result Visual */}
                        <Step visible={step >= 2} className="flex flex-col items-center">
                            <div className="bg-[#1e1e1e] text-slate-300 p-10 rounded-xl shadow-2xl border border-slate-800 w-full max-w-2xl transform -rotate-1">
                                <div className="flex items-center gap-3 border-b border-slate-800 pb-5 mb-6">
                                    <div className="w-8 h-8 rounded-full bg-red-500/20 flex items-center justify-center">
                                        <span className="text-red-500 text-lg font-bold">!</span>
                                    </div>
                                    <span className="text-sm font-bold text-slate-500 uppercase tracking-[0.3em]">AI Output Result</span>
                                </div>
                                <div className="font-mono text-xl space-y-6 mb-8 text-slate-400">
                                    <p>1. Explain the role of the Calvin Cycle in carbon fixation.</p>
                                    <p>2. What is the exact chemical equation for glucose synthesis?</p>
                                </div>
                                <div className="p-6 bg-red-900/20 border border-red-500/40 rounded-xl flex items-start gap-4">
                                    <div className="w-6 h-6 rounded-full border-2 border-red-500 flex items-center justify-center shrink-0 mt-1">
                                        <span className="text-red-500 text-xs font-bold">!</span>
                                    </div>
                                    <p className="text-red-400 text-xl font-bold leading-tight">
                                        Result: Too advanced for Grade 4! Irrelevant to your specific lesson plan.
                                    </p>
                                </div>
                            </div>
                            <p className="text-slate-500 text-sm mt-4 uppercase tracking-[0.4em] font-black italic">The Hallucination of Complexity</p>
                        </Step>

                        <Step visible={step >= 3} className="flex justify-center py-6">
                            <span className="text-5xl font-black text-slate-600 animate-bounce tracking-tighter">⬇️ VS ⬇️</span>
                        </Step>

                        <Step visible={step >= 4} className="relative">
                            {/* Gemini UI Container */}
                            <div className="bg-[#131314] p-10 rounded-3xl border-2 border-[#444746] shadow-2xl overflow-hidden relative font-sans">
                                <div className="flex items-center gap-4 mb-8 border-b border-[#444746] pb-5">
                                     <Sparkles className="text-blue-400 w-8 h-8 fill-blue-400/20" /> 
                                     <span className="text-slate-200 font-bold text-xl uppercase tracking-widest">Gemini <span className="text-sm bg-slate-800 px-3 py-1 rounded-full text-blue-400 ml-4 border border-blue-900">Education Pro</span></span>
                                </div>
                                <div className="flex gap-6">
                                    <div className="w-12 h-12 rounded-full bg-purple-600 flex items-center justify-center text-white font-black text-xl shrink-0 mt-1 shadow-lg">T</div>
                                    <div className="flex-1">
                                        <div className="text-slate-400 text-sm mb-2 font-black uppercase tracking-widest">Teacher Prompt</div>
                                        <div className="text-[#e3e3e3] text-3xl leading-snug font-medium">
                                            "You are a <span className="text-[#a8c7fa] font-black bg-[#1e2b44] px-2 rounded">Grade 4 Science teacher</span>. Using <span className="text-[#a8c7fa] font-black underline decoration-4 underline-offset-8">ONLY the text provided</span>, create a 5-question quiz. Do not include concepts outside this text."
                                        </div>
                                        <div className="mt-8 p-5 bg-[#1e1f20] rounded-2xl border border-[#444746] flex items-center gap-4 w-fit shadow-inner">
                                            <FileText size={24} className="text-[#a8c7fa]" />
                                            <span className="text-slate-300 text-lg font-mono font-bold tracking-tight">textbook_chapter_4.pdf</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <p className="text-center text-slate-500 text-sm mt-4 uppercase tracking-[0.5em] font-black">Grounding via Context</p>
                        </Step>

                        {/* Step 5: The SUCCESSFUL Result Visual */}
                        <Step visible={step >= 5} className="flex flex-col items-center">
                            <div className="bg-[#1e1e1e] text-slate-300 p-10 rounded-xl shadow-2xl border-2 border-emerald-500/30 w-full max-w-2xl transform rotate-1">
                                <div className="flex items-center gap-3 border-b border-slate-800 pb-5 mb-6">
                                    <Sparkles className="text-emerald-500 w-6 h-6" />
                                    <span className="text-sm font-bold text-emerald-500 uppercase tracking-[0.3em]">Perfected Output</span>
                                </div>
                                <h4 className="font-black text-white text-2xl mb-6">Grade 4: How Plants Grow Quiz</h4>
                                <div className="text-xl space-y-6">
                                    <div className="p-6 bg-emerald-500/5 rounded-xl border border-emerald-500/20 shadow-lg">
                                        <p className="font-bold text-emerald-300">1. What three things do plants need to make food?</p>
                                        <p className="text-xs text-slate-500 mt-2 font-bold uppercase tracking-widest italic opacity-60">Verified: Page 12, Paragraph 1</p>
                                    </div>
                                    <div className="p-6 bg-slate-800/40 rounded-xl border border-slate-700/50">
                                        <p className="font-bold">2. True or False: Plants get their energy from the soil.</p>
                                    </div>
                                </div>
                                <div className="mt-10 p-6 bg-emerald-900/30 border-2 border-emerald-500/40 rounded-2xl flex items-center gap-5">
                                    <CheckCircle size={28} className="text-emerald-500" />
                                    <p className="text-emerald-400 text-xl font-black uppercase tracking-tight">
                                        Success: 100% Alignment with Lesson.
                                    </p>
                                </div>
                            </div>
                        </Step>
                    </div>
                )
            },
            {
                id: 3,
                title: "Anatomy of a Prompt",
                subtitle: "The 4 Ps Framework",
                icon: <Target className="w-24 h-24 text-red-500 mb-6" />,
                maxSteps: 4,
                content: (step) => (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mt-4">
                        <Step visible={step >= 1} className="bg-slate-800 p-10 rounded-3xl border-t-8 border-blue-500 shadow-2xl">
                            <div className="flex items-center gap-5 mb-5">
                                <span className="bg-blue-500 text-white font-black w-12 h-12 flex items-center justify-center rounded-2xl text-2xl shadow-lg">1</span>
                                <h3 className="text-3xl font-black text-white">Persona</h3>
                            </div>
                            <p className="text-slate-300 font-bold text-xl mb-4 italic">"Act as a..."</p>
                            <ul className="text-slate-400 text-lg space-y-3 list-disc list-inside font-medium">
                                <li className="text-blue-300 font-bold">"IGCSE Examiner"</li>
                                <li>"Strict Grammarian"</li>
                                <li>"Socratic Science Tutor"</li>
                            </ul>
                        </Step>

                        <Step visible={step >= 2} className="bg-slate-800 p-10 rounded-3xl border-t-8 border-green-500 shadow-2xl">
                            <div className="flex items-center gap-5 mb-5">
                                <span className="bg-green-500 text-white font-black w-12 h-12 flex items-center justify-center rounded-2xl text-2xl shadow-lg">2</span>
                                <h3 className="text-3xl font-black text-white">Purpose</h3>
                            </div>
                            <p className="text-slate-300 font-bold text-xl mb-4 italic">"Define the Task"</p>
                            <ul className="text-slate-400 text-lg space-y-3 list-disc list-inside font-medium">
                                <li>"Create a lesson plan"</li>
                                <li>"Draft a parent email"</li>
                                <li>"Simplify a complex topic"</li>
                            </ul>
                        </Step>

                        <Step visible={step >= 3} className="bg-slate-800 p-10 rounded-3xl border-t-8 border-amber-500 shadow-2xl">
                            <div className="flex items-center gap-5 mb-5">
                                <span className="bg-amber-500 text-white font-black w-12 h-12 flex items-center justify-center rounded-2xl text-2xl shadow-lg">3</span>
                                <h3 className="text-3xl font-black text-white">Parameters</h3>
                            </div>
                            <p className="text-slate-300 font-bold text-xl mb-4 italic">"Set Constraints"</p>
                            <ul className="text-slate-400 text-lg space-y-3 list-disc list-inside font-medium">
                                <li className="text-amber-300 font-bold">"Use IGCSE Command Words"</li>
                                <li>"Simple vocabulary (CEFR A1)"</li>
                                <li>"Format: Table or List"</li>
                            </ul>
                        </Step>

                        <Step visible={step >= 4} className="bg-slate-800 p-10 rounded-3xl border-t-8 border-purple-500 shadow-2xl ring-4 ring-purple-500/20">
                            <div className="flex items-center gap-5 mb-5">
                                <span className="bg-purple-500 text-white font-black w-12 h-12 flex items-center justify-center rounded-2xl text-2xl shadow-lg">4</span>
                                <h3 className="text-3xl font-black text-white">Product</h3>
                            </div>
                            <p className="text-slate-300 font-bold text-xl mb-4 italic">"Grounding Material"</p>
                            <ul className="text-slate-400 text-lg space-y-3 list-disc list-inside font-medium">
                                <li>"Use THIS PDF"</li>
                                <li>"Analyze THIS essay"</li>
                                <li>"Based on THIS rubric"</li>
                            </ul>
                        </Step>
                    </div>
                )
            },
            {
                id: 4,
                title: "Primary",
                subtitle: "Making the Abstract Concrete",
                icon: <BookOpen className="w-24 h-24 text-orange-500 mb-6" />,
                maxSteps: 2,
                content: (step) => (
                    <div className="space-y-10 pb-10">
                        <Step visible={step >= 1} className="bg-slate-800 rounded-2xl border-l-8 border-orange-500 overflow-hidden shadow-2xl">
                            <div className="p-6 bg-orange-900/20 border-b border-slate-700 flex justify-between items-center">
                                <h3 className="font-black text-orange-400 flex items-center gap-3 text-2xl">
                                    <Globe size={28}/> Example 1: ESL

                            <div className="p-8 grid grid-cols-1 md:grid-cols-2 gap-8 text-lg">

                                <div><span className="text-green-400 font-black block mb-2 uppercase text-xs tracking-widest">2. Purpose</span> "Write a 100-word reading passage about a 'Lost Robot' to reinforce grammar."</div>
                                <div><span className="text-amber-400 font-black block mb-2 uppercase text-xs tracking-widest">3. Parameters</span> "Must use Present Continuous 5 times. **Bold** the verbs. Sentences &lt; 10 words."</div>
                                <div><span className="text-purple-400 font-black block mb-2 uppercase text-xs tracking-widest">4. Product</span> "Vocabulary must come *strictly* from *this uploaded Word List*."</div>
                            </div>
                            <div className="p-8 bg-slate-950 border-t border-slate-700">
                                <p className="text-sm text-slate-500 uppercase tracking-[0.3em] mb-4 font-black italic">The Master Prompt</p>
                                <div className="p-6 bg-blue-900/10 rounded-2xl border-2 border-blue-500/20 text-slate-200 font-mono text-xl leading-relaxed">
                                    "Act as a Cambridge Primary English Specialist... Using <strong>[Word List]</strong>, write a 100-word story about a 'Lost Robot'. Use Present Continuous 5 times. <strong>Bold</strong> the verbs. Keep sentences short."
                                </div>
                            </div>
                        </Step>
                        
                        <Step visible={step >= 2} className="bg-slate-800 rounded-2xl border-l-8 border-pink-500 overflow-hidden shadow-2xl">
                            <div className="p-6 bg-pink-900/20 border-b border-slate-700 flex justify-between items-center">
                                <h3 className="font-black text-pink-400 flex items-center gap-3 text-2xl">
                                    <Palette size={28}/> Example 2: Art
                                </h3>
                            </div>
                            <div className="p-8 bg-slate-950 border-t border-slate-700">
                                <div className="p-6 bg-pink-900/10 rounded-2xl border-2 border-pink-500/20 text-slate-200 font-mono text-xl leading-relaxed">
                                    "Act as an engaging Primary Art Teacher. Analyze <strong>[Uploaded Image]</strong> of 'Starry Night'. Explain it to 7-year-olds using sensory words like 'swirling'. Create a crayon-only activity."
                                </div>
                            </div>
                        </Step>
                    </div>
                )
            },
            {
                id: 5,
                title: "Secondary",
                subtitle: "Complexity & Analysis",
                icon: <Beaker className="w-24 h-24 text-teal-500 mb-6" />,
                maxSteps: 2,
                content: (step) => (
                    <div className="space-y-10 pb-10">
                        <Step visible={step >= 1} className="bg-slate-800 rounded-2xl border-l-8 border-teal-500 overflow-hidden shadow-2xl">
                            <div className="p-6 bg-teal-900/20 border-b border-slate-700 flex justify-between items-center">
                                <h3 className="font-black text-teal-400 flex items-center gap-3 text-2xl">
                                    <Target size={28}/> Example 1: Physics
                                </h3>
                                <span className="text-sm bg-slate-700 text-slate-300 px-3 py-1 rounded-full font-bold tracking-widest uppercase">IGCSE Level</span>
                            </div>
                            <div className="p-8 grid grid-cols-1 md:grid-cols-2 gap-8 text-lg">
                                <div><span className="text-blue-400 font-black block mb-2 uppercase text-xs tracking-widest">1. Persona</span> "Act as a strict IGCSE Physics Examiner who values units."</div>
                                <div><span className="text-green-400 font-black block mb-2 uppercase text-xs tracking-widest">2. Purpose</span> "Create 3 scaffolded problems on Projectile Motion."</div>
                                <div><span className="text-amber-400 font-black block mb-2 uppercase text-xs tracking-widest">3. Parameters</span> "Part A (2 marks). Part B (4 marks). Use LaTeX for formulas."</div>

                            </div>
                            <div className="p-8 bg-slate-950 border-t border-slate-700">
                                <div className="p-6 bg-teal-900/10 rounded-2xl border-2 border-teal-500/20 text-slate-200 font-mono text-xl leading-relaxed">
                                    "Act as an IGCSE Physics Examiner. Base questions on <strong>[2023 Paper]</strong>. Create 3 scaffolded problems on Projectile Motion. Use LaTeX for math. Check for significant figures."
                                </div>
                            </div>
                        </Step>
                    </div>
                )
            },
            {
                id: 6,
                title: "Gemini Pro Toolkit",
                subtitle: "Advanced Features",
                icon: <MonitorPlay className="w-24 h-24 text-indigo-500 mb-6" />,
                maxSteps: 6,
                content: (step) => (
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mt-10">
                        <Step visible={step >= 1} className="bg-gradient-to-br from-indigo-600 to-indigo-800 text-white p-8 rounded-3xl shadow-2xl transform hover:scale-105 transition-all">
                            <Layers size={40} className="mb-4 text-indigo-200" />
                            <h3 className="font-black text-2xl mb-2">Massive Context</h3>
                            <p className="text-indigo-100 text-lg font-medium">Upload entire textbooks or term-long curricula at once.</p>
                        </Step>
                        <Step visible={step >= 2} className="bg-gradient-to-br from-blue-600 to-blue-800 text-white p-8 rounded-3xl shadow-2xl transform hover:scale-105 transition-all">
                            <Beaker size={40} className="mb-4 text-blue-200" />
                            <h3 className="font-black text-2xl mb-2">Data Analysis</h3>
                            <p className="text-blue-100 text-lg font-medium">Upload student grades to find trends and build charts instantly.</p>
                        </Step>
                        <Step visible={step >= 3} className="bg-gradient-to-br from-purple-600 to-purple-800 text-white p-8 rounded-3xl shadow-2xl transform hover:scale-105 transition-all">
                            <Target size={40} className="mb-4 text-purple-200" />
                            <h3 className="font-black text-2xl mb-2">Custom Gems</h3>
                            <p className="text-purple-100 text-lg font-medium">Build permanent personas for ongoing specialized help.</p>
                        </Step>
                        <Step visible={step >= 4} className="bg-gradient-to-br from-emerald-600 to-emerald-800 text-white p-8 rounded-3xl shadow-2xl transform hover:scale-105 transition-all">
                            <FileText size={40} className="mb-4 text-emerald-200" />
                            <h3 className="font-black text-2xl mb-2">Workspace</h3>
                            <p className="text-emerald-100 text-lg font-medium">Draft emails in Gmail or lesson plans directly in Google Docs.</p>
                        </Step>
                        <Step visible={step >= 5} className="bg-gradient-to-br from-pink-600 to-pink-800 text-white p-8 rounded-3xl shadow-2xl transform hover:scale-105 transition-all">
                            <ImageIcon size={40} className="mb-4 text-pink-200" />
                            <h3 className="font-black text-2xl mb-2">Image Gen</h3>
                            <p className="text-pink-100 text-lg font-medium">Create detailed diagrams and historical recreations.</p>
                        </Step>
                        <Step visible={step >= 6} className="bg-gradient-to-br from-amber-600 to-amber-800 text-white p-8 rounded-3xl shadow-2xl transform hover:scale-105 transition-all">
                            <Code size={40} className="mb-4 text-amber-200" />
                            <h3 className="font-black text-2xl mb-2">The Canvas</h3>
                            <p className="text-amber-100 text-lg font-medium">Collaborative space to refine rubrics side-by-side.</p>
                        </Step>
                    </div>
                )
            },
            {
                id: 7,
                title: "Your Turn",
                subtitle: "The 3-Step Challenge",
                icon: <Sparkles className="w-24 h-24 text-yellow-500 mb-6" />,
                maxSteps: 7,
                content: (step) => (
                    <div className="space-y-12 pb-16">
                        <Step visible={step >= 1}>
                            <h3 className="font-black text-slate-500 text-lg tracking-[0.4em] uppercase border-b-4 border-slate-700 pb-4 mb-8">Phase 1: The Process</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div className={`p-8 rounded-3xl border-4 transition-all ${step >= 1 ? 'bg-blue-900/40 border-blue-500 scale-105 shadow-2xl' : 'bg-slate-800 border-slate-700 opacity-50'}`}>
                                    <div className="text-4xl font-black text-blue-400 mb-2">1. Goal</div>
                                    <div className="text-slate-300 text-xl font-bold">Quiz, Review, Summary</div>
                                </div>
                                <div className={`p-8 rounded-3xl border-4 transition-all ${step >= 2 ? 'bg-purple-900/40 border-purple-500 scale-105 shadow-2xl' : 'bg-slate-800 border-slate-700 opacity-50'}`}>
                                    <div className="text-4xl font-black text-purple-400 mb-2">2. Upload</div>
                                    <div className="text-slate-300 text-xl font-bold">PDF or Image</div>
                                </div>
                                <div className={`p-8 rounded-3xl border-4 transition-all ${step >= 3 ? 'bg-green-900/40 border-green-500 scale-105 shadow-2xl' : 'bg-slate-800 border-slate-700 opacity-50'}`}>
                                    <div className="text-4xl font-black text-green-400 mb-2">3. Prompt</div>
                                    <div className="text-slate-300 text-xl font-bold">Use the 4Ps</div>
                                </div>
                            </div>
                        </Step>
                        
                         <Step visible={step >= 7} className="pt-12 text-center">
                             <p className="text-4xl md:text-5xl font-serif italic text-slate-400 leading-snug">
                               "Precision in Prompting <br className="hidden md:block" /> Leads to Perfection in Pedagogy."
                             </p>
                        </Step>
                    </div>
                )
            }
        ];

        const currentSlideData = slides[currSlide];

        const next = () => {
            if (currStep < currentSlideData.maxSteps) {
                setCurrStep(prev => prev + 1);
            } else if (currSlide < slides.length - 1) {
                setCurrSlide(prev => prev + 1);
                setCurrStep(0);
            }
        };

        const prev = () => {
            if (currStep > 0) {
                setCurrStep(prev => prev - 1);
            } else if (currSlide > 0) {
                setCurrSlide(prev => prev - 1);
                setCurrStep(slides[currSlide - 1].maxSteps || 0); 
            }
        };

        useEffect(() => {
            const handleKeyDown = (e) => {
                if (e.key === 'ArrowRight' || e.key === ' ') next();
                if (e.key === 'ArrowLeft') prev();
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
        }, [currSlide, currStep]);

        return (
            <div className="w-full max-w-7xl h-[90vh] bg-slate-900 rounded-[3rem] shadow-2xl overflow-hidden flex flex-col border-4 border-slate-800 relative">
                <div className="w-full h-2 bg-slate-800">
                     <div 
                        className="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-500"
                        style={{ width: `${((currSlide) / (slides.length - 1)) * 100}%` }}
                    />
                </div>

                <div 
                    ref={scrollContainerRef}
                    className="flex-1 p-10 md:p-20 flex flex-col overflow-y-auto custom-scrollbar relative z-10"
                >
                    <div className="flex items-start gap-12 mb-12 shrink-0">
                        <div className="hidden md:block p-6 bg-slate-800 rounded-3xl border-2 border-slate-700 shadow-2xl">
                            {currentSlideData.icon}
                        </div>
                        <div>
                            <h1 className="text-5xl md:text-7xl font-black text-white mb-4 tracking-tighter highlight-text leading-none">
                                {currentSlideData.title}
                            </h1>
                            <h2 className="text-2xl md:text-4xl text-blue-400 font-bold tracking-widest uppercase">
                                {currentSlideData.subtitle}
                            </h2>
                        </div>
                    </div>

                    <div className="flex-1">
                        {currentSlideData.content(currStep)}
                    </div>
                </div>

                <div className="bg-slate-950/80 backdrop-blur-xl p-8 border-t-2 border-slate-800 flex justify-between items-center text-slate-400 text-xl font-black select-none shrink-0">
                    <button onClick={prev} className="hover:text-white flex items-center gap-2 transition-all group active:scale-95">
                        <ChevronLeft size={24} className="group-hover:-translate-x-1 transition-transform"/> BACK
                    </button>
                    <div className="flex gap-4">
                         {slides.map((s, idx) => (
                             <div 
                                key={s.id} 
                                className={`h-3 rounded-full transition-all duration-300 ${idx === currSlide ? 'bg-blue-500 w-12' : 'bg-slate-700 w-3'}`} 
                             />
                         ))}
                    </div>
                    <button onClick={next} className="hover:text-white flex items-center gap-2 transition-all group active:scale-95">
                        NEXT <ChevronRight size={24} className="group-hover:translate-x-1 transition-transform"/>
                    </button>
                </div>

                <div className="absolute top-0 right-0 w-[40rem] h-[40rem] bg-blue-500/5 rounded-full blur-[120px] -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>
                <div className="absolute bottom-0 left-0 w-[40rem] h-[40rem] bg-purple-500/5 rounded-full blur-[120px] translate-y-1/2 -translate-x-1/2 pointer-events-none"></div>
            </div>
        );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Presentation />);
</script>
</body>
</html>
